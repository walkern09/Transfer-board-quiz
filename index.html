<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transfer Board Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      font-family: Georgia, serif;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(56,189,248,0); }
    }

    #app { width: 100%; max-width: 680px; animation: fadeIn 0.5s ease; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header .label { font-size: 0.75rem; letter-spacing: 0.2em; color: #7dd3fc; text-transform: uppercase; margin-bottom: 0.5rem; }
    .header h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); color: #f0f9ff; font-weight: normal; letter-spacing: -0.02em; }
    .header .line { width: 40px; height: 2px; background: #38bdf8; margin: 0.75rem auto 0; }

    .progress-row { display: flex; justify-content: space-between; color: #7dd3fc; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .progress-bar { height: 4px; background: #1e3a5f; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 2px; transition: width 0.4s ease; }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      margin-bottom: 1rem;
    }

    .question-text { color: #e0f2fe; font-size: 1.1rem; line-height: 1.6; margin-bottom: 1.75rem; }

    .options { display: flex; flex-direction: column; gap: 0.65rem; }

    .option-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      color: #cbd5e1;
      font-size: 0.95rem;
      font-family: Georgia, serif;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      line-height: 1.4;
      transition: all 0.18s ease;
    }
    .option-btn:hover:not(:disabled) { transform: translateX(4px); }
    .option-btn.selected { background: rgba(56,189,248,0.15); border-color: #38bdf8; color: #e0f2fe; }
    .option-btn.correct { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #bbf7d0; }
    .option-btn.wrong { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #fecaca; }

    .badge {
      min-width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-family: monospace; font-weight: bold;
      flex-shrink: 0;
    }
    .option-btn.selected .badge { background: #38bdf8; color: #0f172a; }
    .option-btn.correct .badge { background: #22c55e; color: #0f172a; }
    .option-btn.wrong .badge { background: #ef4444; color: #fff; }

    .explanation {
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      border-radius: 0 8px 8px 0;
      animation: fadeIn 0.3s ease;
    }
    .explanation.correct-exp { background: rgba(34,197,94,0.08); border-left: 3px solid #22c55e; }
    .explanation.wrong-exp { background: rgba(239,68,68,0.08); border-left: 3px solid #ef4444; }
    .explanation .exp-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.35rem; }
    .explanation.correct-exp .exp-label { color: #86efac; }
    .explanation.wrong-exp .exp-label { color: #fca5a5; }
    .explanation p { color: #cbd5e1; font-size: 0.88rem; line-height: 1.5; }

    .btn-row { display: flex; justify-content: flex-end; }
    .btn {
      padding: 0.75rem 1.75rem; border-radius: 10px; border: none;
      font-size: 0.95rem; font-family: Georgia, serif; font-weight: bold;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #fff; }
    .btn-primary:disabled { background: rgba(255,255,255,0.08); color: #475569; cursor: not-allowed; }
    .btn-pulse { animation: pulse 1.5s infinite; }
    .btn-full { width: 100%; padding: 0.9rem; border-radius: 12px; font-size: 1rem; }

    /* Results */
    .results-header { text-align: center; margin-bottom: 2rem; }
    .score-pct { font-size: 4rem; font-weight: bold; line-height: 1; margin-bottom: 0.5rem; }
    .grade-label { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .grade-msg { color: #94a3b8; font-size: 0.9rem; }
    .score-detail { color: #7dd3fc; margin-top: 0.5rem; font-size: 0.9rem; }

    .review-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .review-item {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
    }
    .review-item.correct-item { border: 1px solid rgba(34,197,94,0.3); }
    .review-item.wrong-item { border: 1px solid rgba(239,68,68,0.3); }
    .review-top { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .review-qnum { color: #94a3b8; font-size: 0.8rem; }
    .review-result { font-size: 0.8rem; font-weight: bold; }
    .review-result.correct-r { color: #22c55e; }
    .review-result.wrong-r { color: #ef4444; }
    .review-q { color: #e2e8f0; font-size: 0.88rem; margin-bottom: 0.4rem; line-height: 1.4; }
    .review-wrong-ans { color: #fca5a5; font-size: 0.82rem; margin-bottom: 0.3rem; }
    .review-correct-ans { color: #86efac; font-size: 0.82rem; margin-bottom: 0.3rem; }
    .review-exp { color: #94a3b8; font-size: 0.8rem; font-style: italic; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="label">Knowledge Assessment</div>
    <h1>Using a Transfer Board</h1>
    <div class="line"></div>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen">
    <div class="progress-row">
      <span id="q-counter">Question 1 of 8</span>
      <span id="score-counter">Score: 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="card">
      <p class="question-text" id="question-text"></p>
      <div class="options" id="options-container"></div>
      <div id="explanation" class="hidden"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="action-btn" disabled>Confirm Answer</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="hidden">
    <div class="results-header">
      <div class="score-pct" id="result-pct"></div>
      <div class="grade-label" id="result-grade"></div>
      <div class="grade-msg" id="result-msg"></div>
      <div class="score-detail" id="result-detail"></div>
    </div>
    <div class="review-list" id="review-list"></div>
    <button class="btn btn-primary btn-full" onclick="restartQuiz()">Retake Quiz</button>
  </div>
</div>

<script>
  const questions = [
    {
      question: "What should you check FIRST before beginning a transfer?",
      options: ["The patient's mood","That all brakes are on and footrests/armrests are removed","The room temperature","That the transfer board is clean"],
      correct: 1,
      explanation: "Before any transfer, all brakes must be on and the arm and footrest on the transfer side must be removed to ensure safety."
    },
    {
      question: "Which transfer board is specifically designed for transferring between surfaces at different heights?",
      options: ["Banana Board","Straight Transfer Board","Buckingham Glideboard","EasyGlide Plastic Transfer Board"],
      correct: 3,
      explanation: "The EasyGlide Plastic Transfer Board is designed specifically for height differences between two surfaces."
    },
    {
      question: "Where should the transfer board be positioned?",
      options: ["Fully under the patient's bottom","Under the patient's thigh, ensuring it is fully on both surfaces","On top of the wheelchair arm","On the floor between the two surfaces"],
      correct: 1,
      explanation: "The board must be positioned under the S/U's thigh and ensure it is fully in contact with both the current seat and the destination surface."
    },
    {
      question: "What should the service user wear during a transfer (unless going to the toilet)?",
      options: ["A hospital gown","Nothing on their lower body","Lower body clothing to prevent friction","Non-slip socks only"],
      correct: 2,
      explanation: "Lower body clothing should be worn during transfers to reduce friction and make movement easier across the board."
    },
    {
      question: "What is the Banana Board's key design feature?",
      options: ["It has a sliding seat mechanism","It is curved and has anti-slip pads on the bottom","It is made of laminated wood","It is designed for height differences"],
      correct: 1,
      explanation: "The Banana Board is curved for better positioning and has anti-slip pads on the bottom. It's also hard-wearing plastic that's easy to clean."
    },
    {
      question: "What should you encourage the service user to do once they are in the middle of the transfer board?",
      options: ["Stop and rest","Call for assistance","Reach across to the wheelchair arm","Lean backwards"],
      correct: 2,
      explanation: "Once in the middle of the transfer board, the S/U should be encouraged to reach across to the wheelchair arm to support their movement across."
    },
    {
      question: "What is the unique feature of the Buckingham Glideboard?",
      options: ["It is banana-shaped","Its seat slides along the board's length for easier movement","It can be used on stairs","It works only on flat surfaces"],
      correct: 1,
      explanation: "The Buckingham Glideboard has a seat designed to slide along the board's length, making movement as easy as possible. It also has contours to fit round chair arms."
    },
    {
      question: "If the two surfaces cannot be made level, what is the safest approach?",
      options: ["Cancel the transfer","Ensure the service user is moving uphill","Ensure the service user is moving downhill","Use two transfer boards"],
      correct: 2,
      explanation: "If surfaces cannot be level, the service user should be moving downhill to make the transfer as easy as possible."
    }
  ];

  let current = 0, score = 0, selected = null, confirmed = false, answers = [];

  function renderQuestion() {
    const q = questions[current];
    document.getElementById('q-counter').textContent = `Question ${current + 1} of ${questions.length}`;
    document.getElementById('score-counter').textContent = `Score: ${score}`;
    document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
    document.getElementById('question-text').textContent = q.question;

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.disabled = false;
      btn.innerHTML = `<span class="badge">${String.fromCharCode(65+i)}</span>${opt}`;
      btn.onclick = () => selectOption(i);
      container.appendChild(btn);
    });

    document.getElementById('explanation').className = 'hidden';
    document.getElementById('explanation').innerHTML = '';

    const actionBtn = document.getElementById('action-btn');
    actionBtn.textContent = 'Confirm Answer';
    actionBtn.disabled = true;
    actionBtn.className = 'btn btn-primary';
    actionBtn.onclick = confirmAnswer;
  }

  function selectOption(i) {
    if (confirmed) return;
    selected = i;
    document.querySelectorAll('.option-btn').forEach((btn, idx) => {
      btn.className = 'option-btn' + (idx === i ? ' selected' : '');
      btn.querySelector('.badge').textContent = String.fromCharCode(65 + idx);
    });
    document.getElementById('action-btn').disabled = false;
  }

  function confirmAnswer() {
    if (selected === null) return;
    confirmed = true;
    const q = questions[current];
    const isCorrect = selected === q.correct;
    if (isCorrect) score++;

    answers.push({ question: q.question, options: q.options, selected, correct: q.correct, explanation: q.explanation });

    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) {
        btn.className = 'option-btn correct';
        btn.querySelector('.badge').textContent = '✓';
      } else if (i === selected && i !== q.correct) {
        btn.className = 'option-btn wrong';
        btn.querySelector('.badge').textContent = '✗';
      } else {
        btn.className = 'option-btn';
      }
    });

    const expDiv = document.getElementById('explanation');
    expDiv.className = `explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'}`;
    expDiv.innerHTML = `<div class="exp-label">${isCorrect ? 'Correct!' : 'Incorrect'}</div><p>${q.explanation}</p>`;

    const actionBtn = document.getElementById('action-btn');
    actionBtn.textContent = current + 1 >= questions.length ? 'See Results →' : 'Next Question →';
    actionBtn.className = 'btn btn-primary btn-pulse';
    actionBtn.disabled = false;
    actionBtn.onclick = nextQuestion;
    document.getElementById('score-counter').textContent = `Score: ${score}`;
  }

  function nextQuestion() {
    if (current + 1 >= questions.length) {
      showResults();
    } else {
      current++;
      selected = null;
      confirmed = false;
      renderQuestion();
    }
  }

  function showResults() {
    document.getElementById('quiz-screen').className = 'hidden';
    document.getElementById('results-screen').className = '';

    const pct = Math.round((score / questions.length) * 100);
    let color, grade, msg;
    if (pct >= 90) { color = '#22c55e'; grade = 'Excellent!'; msg = 'Outstanding understanding of transfer board procedures.'; }
    else if (pct >= 70) { color = '#84cc16'; grade = 'Good Pass'; msg = 'Solid knowledge — review any incorrect answers above.'; }
    else if (pct >= 50) { color = '#f59e0b'; grade = 'Needs Review'; msg = 'Please revisit the training slides before practicing.'; }
    else { color = '#ef4444'; grade = 'Retake Recommended'; msg = 'Please review the full training material and try again.'; }

    document.getElementById('result-pct').style.color = color;
    document.getElementById('result-pct').textContent = pct + '%';
    document.getElementById('result-grade').style.color = color;
    document.getElementById('result-grade').textContent = grade;
    document.getElementById('result-msg').textContent = msg;
    document.getElementById('result-detail').textContent = `You scored ${score} out of ${questions.length}`;

    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = '';
    answers.forEach((a, idx) => {
      const correct = a.selected === a.correct;
      const div = document.createElement('div');
      div.className = `review-item ${correct ? 'correct-item' : 'wrong-item'}`;
      div.innerHTML = `
        <div class="review-top">
          <span class="review-qnum">Q${idx+1}</span>
          <span class="review-result ${correct ? 'correct-r' : 'wrong-r'}">${correct ? '✓ Correct' : '✗ Incorrect'}</span>
        </div>
        <p class="review-q">${a.question}</p>
        ${!correct ? `<p class="review-wrong-ans">Your answer: ${a.options[a.selected]}</p>` : ''}
        <p class="review-correct-ans">Correct: ${a.options[a.correct]}</p>
        <p class="review-exp">${a.explanation}</p>
      `;
      reviewList.appendChild(div);
    });
  }

  function restartQuiz() {
    current = 0; score = 0; selected = null; confirmed = false; answers = [];
    document.getElementById('results-screen').className = 'hidden';
    document.getElementById('quiz-screen').className = '';
    renderQuestion();
  }

  renderQuestion();
</script>
</body>
</html>
